<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SAYUR PEDIA | Premium Digital Market</title>
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  
  <style>
    :root {
      --bg-deep: #070a13;
      --bg-card: rgba(15, 22, 36, 0.7);
      --accent: #00ffaa;
      --text-main: #f3f4f6;
      --brand-text: #fff;
    }
    @media (prefers-color-scheme: light) {
      :root { --bg-deep: #f4f6f9; --bg-card: rgba(255, 255, 255, 0.85); --accent: #00aa6c; --text-main: #1f2937; --brand-text: #1f2937; }
    }
    body { background-color: var(--bg-deep); color: var(--text-main); font-family: 'Plus Jakarta Sans', sans-serif; min-height: 100vh; }
    header { padding: 1rem; display: flex; justify-content: space-between; align-items: center; }
    .brand { font-size: 1.2rem; font-weight: 800; color: var(--brand-text); }
    .catalog-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(200px, 1fr)); gap: 1rem; padding: 1rem; }
    .product-card { background: var(--bg-card); padding: 1rem; border-radius: 12px; }
  </style>
</head>
<body>

  <header>
    <div class="brand">SAYUR PEDIA</div>
    <div class="nav-controls">
      <button class="role-btn active" onclick="switchRole('user')">User</button>
      <button class="role-btn" onclick="switchRole('admin')">Admin</button>
    </div>
  </header>

  <div class="container">
    <div id="catalogGrid" class="catalog-grid">Sedang memuat layanan...</div>
  </div>

  <script>
    var APPS_SCRIPT_URL = "https://script.google.com/macros/s/AKfycbyzKw3rVDvCcIz_dWzCXfTjKAhXKNF7KjTsgw9XE1XKX/exec"; 

    // FUNGSI INI WAJIB ADA AGAR PRODUK MUNCUL
    function doGlobalFetch() {
      fetch(APPS_SCRIPT_URL, {
        method: "POST", mode: "cors",
        body: JSON.stringify({ action: "getProducts", search: "", category: "all", page: 1, limit: 10 })
      })
      .then(res => res.json())
      .then(res => {
        var grid = document.getElementById('catalogGrid');
        grid.innerHTML = '';
        res.products.forEach(p => {
          grid.innerHTML += `<div class="product-card"><h3>${p[1]}</h3><p>Rp ${p[3]}</p></div>`;
        });
      })
      .catch(err => {
        document.getElementById('catalogGrid').innerHTML = "Gagal memuat produk. Cek koneksi API.";
      });
    }

    window.onload = doGlobalFetch;
    
    function switchRole(role) { /* fungsi login admin */ }
  </script>
</body>
</html>

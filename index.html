<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SAYUR PEDIA | Premium Digital Market</title>
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  
  <style>
    :root {
      --bg-deep: #070a13;
      --bg-card: rgba(15, 22, 36, 0.7);
      --bg-card-hover: rgba(22, 33, 54, 0.9);
      --accent: #00ffaa;
      --accent-glow: rgba(0, 255, 170, 0.35);
      --text-main: #f3f4f6;
      --text-muted: #9ca3af;
      --border: rgba(255, 255, 255, 0.07);
      --danger: #ff4a5a;
      --warning: #ffaa00;
      --info: #00bfff;
      --success: #22c55e;
      --header-bg: rgba(7, 10, 19, 0.85);
      --input-bg: rgba(0, 0, 0, 0.4);
      --brand-text: #fff;
    }
    @media (prefers-color-scheme: light) {
      :root {
        --bg-deep: #f4f6f9;
        --bg-card: rgba(255, 255, 255, 0.85);
        --bg-card-hover: rgba(255, 255, 255, 0.98);
        --accent: #00aa6c;
        --accent-glow: rgba(0, 170, 108, 0.2);
        --text-main: #1f2937;
        --text-muted: #6b7280;
        --border: rgba(0, 0, 0, 0.08);
        --header-bg: rgba(255, 255, 255, 0.9);
        --input-bg: rgba(255, 255, 255, 1);
        --brand-text: #1f2937;
      }
    }
    * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Plus Jakarta Sans', sans-serif; }
    html, body { max-width: 100%; overflow-x: hidden; }
    body { background-color: var(--bg-deep); color: var(--text-main); min-height: 100vh; transition: background-color 0.3s, color 0.3s; }
    header { background: var(--header-bg); border-bottom: 1px solid var(--border); position: sticky; top: 0; z-index: 100; padding: 1rem; display: flex; justify-content: space-between; align-items: center; }
    .brand { font-size: 1.2rem; font-weight: 800; color: var(--brand-text); }
    .brand span { color: var(--accent); }
    .nav-controls { display: flex; align-items: center; gap: 0.5rem; }
    .role-container { background: rgba(120, 120, 120, 0.1); border: 1px solid var(--border); padding: 0.2rem; border-radius: 30px; display: flex; }
    .role-btn { padding: 0.4rem 0.8rem; border-radius: 20px; border: none; background: transparent; color: var(--text-muted); cursor: pointer; font-weight: 600; font-size: 0.75rem; }
    .role-btn.active { background: var(--accent); color: #fff; }
    .container { max-width: 1300px; margin: 1.5rem auto; padding: 0 1rem; width: 100%; }
    .hero-section { text-align: center; padding: 1rem 0.5rem 2rem 0.5rem; max-width: 800px; margin: 0 auto; }
    .hero-section h1 { font-size: 1.8rem; font-weight: 800; color: var(--brand-text); margin-bottom: 0.75rem; }
    .hero-section h1 span { color: var(--accent); }
    .user-track-bar { background: rgba(120, 120, 120, 0.05); border: 1px dashed var(--border); border-radius: 12px; padding: 1rem; margin-bottom: 1.5rem; display: flex; flex-direction: column; gap: 0.75rem; align-items: center; }
    .track-input-group { display: flex; width: 100%; gap: 0.5rem; max-width: 500px; }
    .track-input-group input { flex: 1; padding: 0.65rem 1rem; background: var(--input-bg); border: 1px solid var(--border); border-radius: 8px; color: var(--text-main); font-size: 0.85rem; text-align: center; font-weight: 600; }
    .btn-track { background: transparent; border: 1px solid var(--accent); color: var(--accent); padding: 0 1.2rem; border-radius: 8px; font-weight: 700; cursor: pointer; }
    .filter-bar { background: var(--bg-card); border: 1px solid var(--border); border-radius: 16px; padding: 1rem; margin-bottom: 1.5rem; display: flex; flex-direction: column; gap: 1rem; }
    .search-input-group input { width: 100%; padding: 0.8rem 1rem 0.8rem 2.6rem; background: var(--input-bg); border: 1px solid var(--border); border-radius: 8px; color: var(--text-main); }
    .catalog-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(220px, 1fr)); gap: 1rem; width: 100%; }
    .product-card { background: var(--bg-card); border: 1px solid var(--border); border-radius: 14px; overflow: hidden; display: flex; flex-direction: column; padding: 1rem; }
    .price-tag { font-size: 1.05rem; font-weight: 800; color: var(--accent); }
    .btn-buy { background: transparent; border: 1px solid var(--accent); color: var(--accent); padding: 0.5rem; border-radius: 6px; font-weight: 700; cursor: pointer; width: 100%; margin-top: 1rem; }
    .tx-section { background: var(--bg-card); border: 1px solid var(--border); border-radius: 16px; padding: 1.5rem; margin-top: 3rem; display: none; }
    .tx-table { width: 100%; border-collapse: collapse; text-align: left; font-size: 0.85rem; }
    .tx-table th, .tx-table td { padding: 0.75rem; border-bottom: 1px solid var(--border); }
    .modal-backdrop { position: fixed; top: 0; left: 0; width: 100vw; height: 100vh; background: rgba(3, 5, 10, 0.6); backdrop-filter: blur(8px); z-index: 200; display: flex; justify-content: center; align-items: center; opacity: 0; pointer-events: none; transition: opacity 0.3s; padding: 1rem; }
    .modal-backdrop.show { opacity: 1; pointer-events: auto; }
    .modal-window { background: var(--bg-card-hover); border: 1px solid var(--border); border-radius: 20px; width: 100%; max-width: 450px; padding: 1.5rem; }
    .form-group { margin-bottom: 1rem; }
    .form-group label { display: block; font-size: 0.75rem; font-weight: 600; margin-bottom: 0.4rem; color: var(--text-muted); text-transform: uppercase; }
    .form-group input, .form-group textarea { width: 100%; padding: 0.65rem; background: var(--input-bg); border: 1px solid var(--border); border-radius: 8px; color: var(--text-main); }
    .btn-premium { background: var(--accent); color: #070a13; padding: 0.8rem; border: none; border-radius: 8px; font-weight: 700; cursor: pointer; width: 100%; }
    .toast { position: fixed; bottom: 20px; right: 20px; background: var(--accent); color: #070a13; padding: 0.8rem 1.5rem; border-radius: 8px; font-weight: 700; opacity: 0; transition: opacity 0.3s; z-index: 300; pointer-events: none; }
    .toast.show { opacity: 1; }
  </style>
</head>
<body>

  <header>
    <div class="brand"><i class="fa-solid fa-bolt" style="color:#00ffaa;"></i>SAYUR<span>PEDIA</span></div>
    <div class="nav-controls">
      <div class="role-container">
        <button class="role-btn active" id="btnRoleUser" onclick="switchRole('user')">User</button>
        <button class="role-btn" id="btnRoleAdmin" onclick="switchRole('admin')">Admin</button>
      </div>
    </div>
  </header>

  <div class="container">
    <div class="hero-section">
      <h1>Explore <span>Premium</span> Subscriptions</h1>
      <p>Dapatkan akun orisinal bergaransi penuh dengan pemrosesan instan.</p>
    </div>

    <div class="user-track-bar" id="userTrackSection">
      <label><i class="fa-solid fa-magnifying-glass-location"></i> Lacak Pesanan</label>
      <div class="track-input-group">
        <input type="text" id="txtTrackInvoice" placeholder="ID Transaksi (Contoh: PEDIA-2026...)">
        <button class="btn-track" onclick="trackInvoiceUser()">Periksa</button>
      </div>
      <div class="track-result-box" id="trackResultContainer" style="display:none; margin-top:10px;"></div>
    </div>

    <div class="filter-bar">
      <div class="search-input-group" style="position:relative;">
        <i class="fa-solid fa-magnifying-glass" style="position:absolute; left:1rem; top:50%; transform:translateY(-50%); color:var(--text-muted);"></i>
        <input type="text" id="txtSearch" placeholder="Cari layanan (YouTube, Canva...)" oninput="triggerSearch()" style="padding-left:2.5rem;">
      </div>
    </div>

    <div class="catalog-grid" id="catalogGrid"></div>

    <div class="tx-section" id="adminTxPanel">
      <h3>Panel Manajemen Transaksi Admin</h3>
      <div style="overflow-x:auto; margin-top:1rem;">
        <table class="tx-table">
          <thead><tr><th>ID</th><th>Tanggal</th><th>Nama</th><th>Total</th><th>Status</th></tr></thead>
          <tbody id="adminTxTableBody"></tbody>
        </table>
      </div>
    </div>
  </div>

  <!-- MODAL CHECKOUT USER -->
  <div class="modal-backdrop" id="userOrderModal">
    <div class="modal-window">
      <h3 id="lblTargetItemName" style="color:var(--brand-text); margin-bottom:0.5rem;">Produk</h3>
      <p id="lblTargetItemPrice" style="color:var(--accent); font-weight:700; margin-bottom:1rem;">Rp 0</p>
      <div class="form-group"><label>Nama Pembeli</label><input type="text" id="txtUserOrderName" placeholder="Nama Anda"></div>
      <div class="form-group"><label>Email / Catatan Tujuan</label><textarea id="txtUserOrderAddress" rows="2" placeholder="emailanda@gmail.com"></textarea></div>
      <button class="btn-premium" onclick="executeDirectUserCheckout()"><i class="fa-brands fa-whatsapp"></i> Ambil via WhatsApp</button>
      <button onclick="closeUserOrderModal()" style="background:transparent; border:none; color:var(--text-muted); width:100%; margin-top:0.8rem; cursor:pointer;">Batal</button>
    </div>
  </div>

  <div class="toast" id="globalToast">Pesan Terkirim!</div>

  <script>
    // URL WEB APP APPS SCRIPT ANDA
    var APPS_SCRIPT_URL = "https://script.google.com/macros/s/AKfycbyzKw3rVDvCcIz_dWzCXfTjKAhXKNF7KjTsgw9XE1XKX/exec"; 

    var currentRole = 'user';
    var globalProducts = [];
    var cacheTransactions = [];
    var activeSingleSelection = null;
    var WHATSAPP_ADMIN_NUMBER = "6285888011755";
    var searchTimeout = null;

    window.addEventListener('DOMContentLoaded', function() {
      doGlobalFetch();
      preloadTransactionCache();
    });

    function showToast(msg) {
      var t = document.getElementById('globalToast');
      t.innerText = msg; t.classList.add('show');
      setTimeout(() => t.classList.remove('show'), 3000);
    }

    function callServerApi(payload, callback) {
      fetch(APPS_SCRIPT_URL, {
        method: "POST",
        mode: "cors",
        headers: { "Content-Type": "text/plain;charset=utf-8" },
        body: JSON.stringify(payload)
      })
      .then(res => res.json())
      .then(data => callback(data))
      .catch(err => {
        console.error(err);
        showToast("Koneksi API Gagal!");
      });
    }

    function doGlobalFetch() {
      var search = document.getElementById('txtSearch').value;
      callServerApi({ action: "getProducts", search: search, category: "all", page: 1, limit: 12 }, function(res) {
        if (res && res.products) {
          globalProducts = res.products;
          renderCatalog(res.products);
        }
      });
    }

    function triggerSearch() {
      clearTimeout(searchTimeout);
      searchTimeout = setTimeout(doGlobalFetch, 400);
    }

    function renderCatalog(products) {
      var grid = document.getElementById('catalogGrid');
      grid.innerHTML = '';
      if (!products.length) {
        grid.innerHTML = '<p style="color:var(--text-muted); grid-column:1/-1; text-align:center;">Tidak ada produk ditemukan.</p>';
        return;
      }
      products.forEach(p => {
        var id = p[0], nama = p[1], kat = p[2], harga = Number(p[3]), stok = Number(p[4]), desc = p[5], img = p[6] || 'https://images.unsplash.com/photo-1611162617213-7d7a39e9b1d7?w=400';
        grid.innerHTML += `
          <div class="product-card">
            <img src="${img}" style="width:100%; height:140px; object-fit:cover;">
            <div style="padding:0.8rem; display:flex; flex-direction:column; flex:1;">
              <span style="font-size:0.65rem; color:var(--accent); text-transform:uppercase; font-weight:700;">${kat}</span>
              <h4 style="color:var(--brand-text); font-size:0.95rem; margin:0.2rem 0;">${nama}</h4>
              <p style="font-size:0.75rem; color:var(--text-muted); flex:1;">${desc}</p>
              <div style="display:flex; justify-content:space-between; align-items:center; margin-top:0.8rem;">
                <span class="price-tag">Rp ${harga.toLocaleString('id-ID')}</span>
                <span style="font-size:0.7rem; color:var(--text-muted);">Stok: <b>${stok}</b></span>
              </div>
              ${stok > 0 ? `<button class="btn-buy" onclick="openUserOrderModal('${id}','${nama.replace(/'/g,"\\'")}',${harga})">Ambil Slot</button>` : `<button class="btn-buy" style="border-color:var(--danger); color:var(--danger);" disabled>Habis</button>`}
            </div>
          </div>`;
      });
    }

    function openUserOrderModal(id, nama, harga) {
      activeSingleSelection = { id: id, nama: nama, harga: harga };
      document.getElementById('lblTargetItemName').innerText = nama;
      document.getElementById('lblTargetItemPrice').innerText = "Harga: Rp " + harga.toLocaleString('id-ID');
      document.getElementById('txtUserOrderName').value = "";
      document.getElementById('txtUserOrderAddress').value = "";
      document.getElementById('userOrderModal').classList.add('show');
    }

    function closeUserOrderModal() {
      document.getElementById('userOrderModal').classList.remove('show');
    }

    function executeDirectUserCheckout() {
      if (!activeSingleSelection) return;
      var name = document.getElementById('txtUserOrderName').value.trim();
      var mail = document.getElementById('txtUserOrderAddress').value.trim();
      if (!name || !mail) { showToast("Nama dan Email wajib diisi!"); return; }

      var payloadCart = [{ id: activeSingleSelection.id, nama: activeSingleSelection.nama, harga: activeSingleSelection.harga, qty: 1 }];

      closeUserOrderModal();
      showToast("Memproses pesanan...");

      callServerApi({ action: "checkout", name: name, total: activeSingleSelection.harga, cart: payloadCart }, function(res) {
        if (res.success) {
          var text = "*INVOICE PESANAN*\nID: " + res.transactionId + "\nNama: " + name + "\nTujuan: " + mail + "\nLayanan: " + activeSingleSelection.nama + "\nTotal: Rp " + activeSingleSelection.harga.toLocaleString('id-ID') + "\n\nMohon konfirmasi pembayarannya.";
          window.open("https://api.whatsapp.com/send?phone=" + WHATSAPP_ADMIN_NUMBER + "&text=" + encodeURIComponent(text), '_blank');
          doGlobalFetch();
          preloadTransactionCache();
        }
      });
    }

    function preloadTransactionCache() {
      callServerApi({ action: "getTransactions", token: sessionStorage.getItem("pedia_session_token") || "" }, function(res) {
        if (res && res.transactions) cacheTransactions = res.transactions;
      });
    }

    function trackInvoiceUser() {
      var id = document.getElementById('txtTrackInvoice').value.trim().toUpperCase();
      var box = document.getElementById('trackResultContainer');
      box.style.display = 'block';
      if (!id) { box.innerHTML = "<span style='color:var(--danger);'>Masukkan ID transaksi!</span>"; return; }
      var found = cacheTransactions.find(t => t[0].toUpperCase() === id);
      if (!found) { box.innerHTML = "<span style='color:var(--danger);'>ID Transaksi tidak ditemukan.</span>"; return; }
      box.innerHTML = `<div><span>ID:</span> <b>${found[0]}</b></div><div><span>Status:</span> <span style="color:var(--accent); font-weight:700;">${found[4]}</span></div>`;
    }

    function switchRole(role) {
      if (role === 'admin') {
        if (sessionStorage.getItem("pedia_session_token")) {
          currentRole = 'admin';
          document.getElementById('adminTxPanel').style.display = 'block';
          fetchAdminTransactions();
          return;
        }
        var pass = prompt("Masukkan Kunci Admin:");
        if (!pass) return;
        callServerApi({ action: "verifyPassword", password: pass }, function(res) {
          if (res.authorized) {
            sessionStorage.setItem("pedia_session_token", res.token);
            currentRole = 'admin';
            document.getElementById('adminTxPanel').style.display = 'block';
            fetchAdminTransactions();
            showToast(res.message);
          } else {
            showToast(res.message);
          }
        });
      } else {
        sessionStorage.removeItem("pedia_session_token");
        currentRole = 'user';
        document.getElementById('adminTxPanel').style.display = 'none';
      }
      document.getElementById('btnRoleUser').classList.toggle('active', role === 'user');
      document.getElementById('btnRoleAdmin').classList.toggle('active', role === 'admin');
    }

    function fetchAdminTransactions() {
      callServerApi({ action: "getTransactions", token: sessionStorage.getItem("pedia_session_token") || "" }, function(res) {
        if (res && res.transactions) {
          cacheTransactions = res.transactions;
          var tbody = document.getElementById('adminTxTableBody');
          tbody.innerHTML = '';
          if (!res.transactions.length) {
            tbody.innerHTML = '<tr><td colspan="5" style="text-align:center; color:var(--text-muted);">Belum ada transaksi.</td></tr>';
            return;
          }
          res.transactions.forEach(tx => {
            tbody.innerHTML += `<tr><td><b>${tx[0]}</b></td><td>${tx[1]}</td><td>${tx[2]}</td><td>Rp ${Number(tx[3]).toLocaleString('id-ID')}</td><td><span style="color:var(--accent); font-weight:700;">${tx[4]}</span></td></tr>`;
          });
        }
      });
    }
  </script>
</body>
</html>

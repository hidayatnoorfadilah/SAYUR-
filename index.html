<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SAYUR PEDIA | Premium Digital Market</title>
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  
  <style>
    :root {
      --bg-deep: #070a13;
      --bg-card: rgba(15, 22, 36, 0.7);
      --bg-card-hover: rgba(22, 33, 54, 0.9);
      --accent: #00ffaa;
      --accent-glow: rgba(0, 255, 170, 0.35);
      --text-main: #f3f4f6;
      --text-muted: #9ca3af;
      --border: rgba(255, 255, 255, 0.07);
      --danger: #ff4a5a;
      --warning: #ffaa00;
      --info: #00bfff;
      --success: #22c55e;
      --header-bg: rgba(7, 10, 19, 0.85);
      --input-bg: rgba(0, 0, 0, 0.4);
      --brand-text: #fff;
    }
    @media (prefers-color-scheme: light) {
      :root {
        --bg-deep: #f4f6f9;
        --bg-card: rgba(255, 255, 255, 0.85);
        --bg-card-hover: rgba(255, 255, 255, 0.98);
        --accent: #00aa6c;
        --accent-glow: rgba(0, 170, 108, 0.2);
        --text-main: #1f2937;
        --text-muted: #6b7280;
        --border: rgba(0, 0, 0, 0.08);
        --header-bg: rgba(255, 255, 255, 0.9);
        --input-bg: rgba(255, 255, 255, 1);
        --brand-text: #1f2937;
      }
    }
    * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Plus Jakarta Sans', sans-serif; }
    body { background-color: var(--bg-deep); color: var(--text-main); min-height: 100vh; transition: background-color 0.3s; }
    header { background: var(--header-bg); border-bottom: 1px solid var(--border); padding: 1rem; display: flex; justify-content: space-between; align-items: center; position: sticky; top: 0; z-index: 100; }
    .brand { font-size: 1.2rem; font-weight: 800; color: var(--brand-text); }
    .container { max-width: 1300px; margin: 1.5rem auto; padding: 0 1rem; }
    .btn-premium { background: var(--accent); color: #fff; padding: 0.8rem 1.2rem; border: none; border-radius: 8px; font-weight: 700; cursor: pointer; }
    .tx-section { background: var(--bg-card); border: 1px solid var(--border); border-radius: 16px; padding: 1.5rem; margin-top: 3rem; display: none; }
    .admin-action-header { display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; gap: 1rem; margin-top: 2rem; }
    .admin-button-group { display: flex; gap: 0.5rem; flex-wrap: wrap; }
    .btn-pdf { background: var(--danger); color: white; border: none; padding: 0.6rem 1.2rem; border-radius: 8px; font-weight: 700; cursor: pointer; }
    .btn-wa-report { background: var(--success); color: white; border: none; padding: 0.6rem 1.2rem; border-radius: 8px; font-weight: 700; cursor: pointer; }
    .toast { position: fixed; bottom: 20px; right: 20px; background: var(--accent); color: #fff; padding: 0.8rem 1.5rem; border-radius: 8px; font-weight: 700; opacity: 0; transition: opacity 0.3s; }
    .toast.show { opacity: 1; }
    .modal-backdrop { position: fixed; top: 0; left: 0; width: 100vw; height: 100vh; background: rgba(0,0,0,0.5); display: flex; justify-content: center; align-items: center; opacity: 0; pointer-events: none; }
    .modal-backdrop.show { opacity: 1; pointer-events: auto; }
    .modal-window { background: var(--bg-card-hover); padding: 1.5rem; border-radius: 20px; width: 90%; max-width: 400px; }
  </style>
</head>
<body>

  <header>
    <div class="brand">SAYUR PEDIA</div>
    <div class="nav-controls">
      <button class="role-btn active" id="btnRoleUser" onclick="switchRole('user')">User</button>
      <button class="role-btn" id="btnRoleAdmin" onclick="switchRole('admin')">Admin</button>
    </div>
  </header>

  <div class="container">
    <div class="tx-section" id="adminTxPanel">
      <div class="admin-action-header">
        <h3>Manajemen Transaksi</h3>
        <div class="admin-button-group">
          <!-- Tombol Reset sudah dihapus sesuai permintaan -->
          <button class="btn-wa-report" onclick="generateWhatsappReportAdmin()"><i class="fa-brands fa-whatsapp"></i> Laporan WA</button>
          <button class="btn-pdf" onclick="generateInvoicePdfReport()"><i class="fa-solid fa-file-pdf"></i> PDF</button>
        </div>
      </div>
      <div class="tx-table-wrapper">
        <table class="tx-table">
          <thead><tr><th>ID Transaksi</th><th>Tanggal</th><th>Nama</th><th>Total</th><th>Status</th></tr></thead>
          <tbody id="adminTxTableBody"></tbody>
        </table>
      </div>
    </div>
  </div>

  <div class="toast" id="globalToast">Pesan Terkirim!</div>

  <script>
    // URL API SESUAI HASIL DEPLOYMENT PRODUKSI ANDA
    var APPS_SCRIPT_URL = "https://script.google.com/macros/s/AKfycbyzKw3rVDvCcIz_dWzCXfTjKAhXKNF7KjTsgw9XE1XKX/exec"; 

    var currentRole = 'user';
    var cacheTransactions = [];

    function showToast(message) {
      var toast = document.getElementById('globalToast');
      toast.innerText = message; toast.classList.add('show');
      setTimeout(function() { toast.classList.remove('show'); }, 3000);
    }

    function callServerApi(payload, callback) {
      fetch(APPS_SCRIPT_URL, {
        method: "POST", mode: "cors", headers: { "Content-Type": "text/plain;charset=utf-8" },
        body: JSON.stringify(payload)
      })
      .then(res => res.json())
      .then(data => callback(data))
      .catch(err => { console.error(err); showToast("Koneksi API Gagal!"); });
    }

    function generateWhatsappReportAdmin() {
      if (!cacheTransactions.length) { showToast("Tidak ada data!"); return; }
      var total = cacheTransactions.length;
      var pesan = "*LAPORAN TOKO*\nTotal Transaksi: " + total;
      window.open("https://api.whatsapp.com/send?phone=6285888011755&text=" + encodeURIComponent(pesan), '_blank');
    }

    function generateInvoicePdfReport() {
      if (!cacheTransactions.length) { showToast("Tidak ada data!"); return; }
      window.print();
    }

    function switchRole(role) {
      if (role === 'admin') {
        var inputPass = prompt("Masukkan Kunci Admin:");
        if (inputPass === "152531") { 
          currentRole = 'admin'; 
          document.getElementById('adminTxPanel').style.display = 'block';
          callServerApi({action: "getTransactions", token: "TOKEN_SAY_BOSS_PEDIA_2026"}, (res) => { cacheTransactions = res.transactions; });
        } else { showToast("Password salah!"); }
      } else {
        currentRole = 'user';
        document.getElementById('adminTxPanel').style.display = 'none';
      }
    }
  </script>
</body>
</html>
